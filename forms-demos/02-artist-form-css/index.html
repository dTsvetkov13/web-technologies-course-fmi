<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Artist</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
        }
        form {
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 5px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 3px;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #00aa00;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #008000;
        }
        .section-title {
            margin-top: 20px;
            margin-bottom: 15px;
            font-size: 14px;
            color: #666;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <h1>Add Artist & Song</h1>
    <form action="add-artist.php" method="POST">
        <div class="section-title">Artist Information</div>
        
        <div class="form-group">
            <label for="artistName">Artist Name:</label>
            <input type="text" id="artistName" name="artistName" required>
        </div>
        
        <div class="form-group">
            <label for="genre">Genre:</label>
            <input type="text" id="genre" name="genre">
        </div>
        
        <div class="form-group">
            <label for="country">Country:</label>
            <input type="text" id="country" name="country">
        </div>
        
        <div class="section-title">Song Information</div>
        
        <div class="form-group">
            <label for="songTitle">Song Title:</label>
            <input type="text" id="songTitle" name="songTitle">
        </div>
        
        <div class="form-group">
            <label for="duration">Duration (minutes):</label>
            <input type="number" id="duration" name="duration" min="0" step="0.1">
        </div>
        
        <button type="submit">Add Artist & Song</button>
    </form>
</body>
</html>
